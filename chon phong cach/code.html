<script>
function selectTheme(clickedOption) {
  document.querySelectorAll('.theme-option').forEach(opt => {
    opt.querySelector('.theme-card').classList.remove('theme-card-selected');
    opt.querySelector('.check-icon').classList.replace('scale-100','scale-0');
    const lbl = opt.querySelector('.theme-label');
    lbl.classList.remove('font-bold','text-brand-red');
    lbl.classList.add('font-medium','opacity-50');
  });
  clickedOption.querySelector('.theme-card').classList.add('theme-card-selected');
  clickedOption.querySelector('.check-icon').classList.replace('scale-0','scale-100');
  const lbl = clickedOption.querySelector('.theme-label');
  lbl.classList.remove('font-medium','opacity-50');
  lbl.classList.add('font-bold','text-brand-red');
}
</script>
