<!DOCTYPE html>
<html class="light" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>AI Career Orientation Test</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#D91E18", // Vibrant red based on branding
            "background-light": "#F9FAFB",
            "background-dark": "#111827",
          },
          fontFamily: {
            display: ["Lexend", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "12px",
            'xl': '16px',
          },
        },
      },
    };
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dark .glass-card {
      background: rgba(31, 41, 55, 0.7);
    }

    .safe-top {
      padding-top: env(safe-area-inset-top);
    }

    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
  <div class="fixed top-0 left-0 w-full h-1 bg-gray-200 dark:bg-gray-800 z-50">
    <div class="h-full bg-primary" style="width: 30%"></div>
  </div>
  <div class="max-w-md mx-auto min-h-screen flex flex-col px-6 relative">
    <header class="safe-top pt-6 pb-4 flex items-center justify-between">
      <button
        class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700"
        onclick="window.location.href='../home/code.html'">
        <span class="material-icons-round text-gray-700 dark:text-gray-200">arrow_back_ios_new</span>
      </button>
      <h1 class="text-lg font-bold text-center flex-1 pr-10">Trắc nghiệm AI</h1>
    </header>
    <main class="flex-1 py-4 space-y-8 relative">
      <div class="absolute -top-4 right-0 transform translate-x-2 -translate-y-2 z-10">
        <div
          class="w-20 h-20 bg-gradient-to-br from-red-100 to-red-200 dark:from-red-900/40 dark:to-red-800/20 rounded-2xl flex items-center justify-center shadow-lg border-2 border-white dark:border-gray-800 animate-bounce transition-all duration-1000">
          <span class="material-icons-round text-primary text-5xl">smart_toy</span>
        </div>
      </div>
      <div
        class="glass-card border border-white/40 dark:border-gray-700/50 rounded-xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1.5 h-full bg-primary"></div>
        <p class="text-sm font-semibold text-primary mb-3 uppercase tracking-wider">Câu hỏi 03/10</p>
        <h2 class="text-2xl font-bold leading-tight">Bạn thích làm việc với con người hay máy móc?</h2>
      </div>
      <div class="space-y-4">
        <button
          class="w-full text-left p-5 rounded-xl bg-white dark:bg-gray-800 border-2 border-primary shadow-lg flex items-center justify-between group transition-all">
          <div class="flex items-center space-x-4">
            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">A
            </div>
            <span class="text-lg font-medium">Làm việc với con người</span>
          </div>
          <div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
            <span class="material-icons-round text-white text-sm">check</span>
          </div>
        </button>
        <button
          class="w-full text-left p-5 rounded-xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-md flex items-center space-x-4 hover:border-gray-300 dark:hover:border-gray-500 transition-all active:scale-[0.98]">
          <div
            class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-500 dark:text-gray-400 font-bold">
            B</div>
          <span class="text-lg font-medium">Làm việc với máy móc</span>
        </button>
        <button
          class="w-full text-left p-5 rounded-xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-md flex items-center space-x-4 hover:border-gray-300 dark:hover:border-gray-500 transition-all active:scale-[0.98]">
          <div
            class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-500 dark:text-gray-400 font-bold">
            C</div>
          <span class="text-lg font-medium">Cả hai đều thú vị</span>
        </button>
        <button
          class="w-full text-left p-5 rounded-xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-md flex items-center space-x-4 hover:border-gray-300 dark:hover:border-gray-500 transition-all active:scale-[0.98]">
          <div
            class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-500 dark:text-gray-400 font-bold">
            D</div>
          <span class="text-lg font-medium">Tôi chưa xác định được</span>
        </button>
      </div>
    </main>
    <footer class="safe-bottom pb-8 pt-4">
      <button
        class="w-full bg-gradient-to-r from-primary to-rose-700 text-white font-bold py-5 rounded-xl shadow-xl shadow-primary/20 hover:shadow-primary/40 active:scale-95 transition-all flex items-center justify-center space-x-2"
        onclick="window.location.href='../kết quả của bạn/code.html'">
        <span>Câu tiếp theo</span>
        <span class="material-icons-round">arrow_forward</span>
      </button>
      <div class="mt-6 flex justify-center items-center space-x-2">
        <span class="text-xs text-slate-400 dark:text-slate-500">Powered by SAIGONTECH AI</span>
      </div>
    </footer>
    <div class="fixed -bottom-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
    <div class="fixed -top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
  </div>
  <button
    class="fixed bottom-24 right-6 w-12 h-12 bg-white dark:bg-gray-800 rounded-full shadow-2xl flex items-center justify-center border border-gray-100 dark:border-gray-700 z-50"
    onclick="document.documentElement.classList.toggle('dark')">
    <span class="material-icons-round dark:hidden text-gray-600">dark_mode</span>
    <span class="material-icons-round hidden dark:block text-yellow-400">light_mode</span>
  </button>

</body>

</html>
