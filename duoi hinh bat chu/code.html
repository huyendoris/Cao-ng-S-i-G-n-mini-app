<!DOCTYPE html>
<html class="light" lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đuổi Hình Bắt Chữ - Career Hub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#E30613",
                        "game-bg-start": "#FFF6F6",
                        "game-bg-end": "#FFEAEA",
                    },
                    fontFamily: {
                        display: ["Lexend", "sans-serif"],
                        sans: ["Lexend", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': "1.25rem",
                        '2xl': "2rem",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        body {
            background: linear-gradient(180deg, #FFF6F6 0%, #FFEAEA 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .puzzle-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .submit-gradient {
            background: linear-gradient(135deg, #FF3A3A 0%, #E60023 100%);
            box-shadow: 0 4px 15px rgba(230, 0, 35, 0.3);
        }
        .abstract-shape {
            position: absolute;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="font-sans text-slate-900 overflow-x-hidden">
    <div class="h-11 w-full">
        <div class="flex justify-between items-center px-6 h-full text-xs font-semibold">
            <span>9:41</span>
            <div class="flex gap-1.5">
                <span class="material-icons-round text-[14px]">signal_cellular_alt</span>
                <span class="material-icons-round text-[14px]">wifi</span>
                <span class="material-icons-round text-[14px]">battery_full</span>
            </div>
        </div>
    </div>
    <div class="abstract-shape top-20 -left-10 w-40 h-40 bg-red-100 rounded-full blur-3xl"></div>
    <div class="abstract-shape bottom-40 -right-10 w-60 h-60 bg-pink-100 rounded-full blur-3xl"></div>
    <header class="px-5 py-3 flex justify-between items-center sticky top-0 z-40 bg-transparent">
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/80 backdrop-blur shadow-sm">
            <span class="material-icons-round text-slate-700">chevron_left</span>
        </button>
        <h1 class="text-lg font-bold text-slate-800">Đuổi Hình Bắt Chữ</h1>
        <div class="bg-white px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-sm border border-white">
            <span class="material-icons-round text-yellow-500 text-sm">monetization_on</span>
            <span class="text-slate-800 text-sm font-bold">1,250</span>
        </div>
    </header>
    <main class="flex-1 px-6 flex flex-col items-center z-10">
        <div class="w-full max-w-sm mt-4">
            <div class="bg-white puzzle-card rounded-[20px] p-4 flex flex-col items-center">
                <div class="w-full aspect-square rounded-xl overflow-hidden bg-slate-50 mb-4 border border-slate-100">
                    <img alt="Puzzle Image" class="w-full h-full object-cover"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqWpVccfYIyb9MwPMt3CX05pn_LlX_fx9wo5Cdr79oARGoh-zS9qK8jXX4f6kfGDokih0Acnc1ZzUN3wcyMJZe-FOhgv0SEyISYvWwC6gVUym8CHLWt2p_GeukO2FipzCQ63V8BbeCY2KU17i9PaN_h8Ub_dtqm95RB3O0bAIzcJRkpHrbdyKyUmLbD4yIfui5eQLLpOdrc9kwtCWR-BLdoKrx5oUTkEQrQelydUS8PaB-7kapIKDm-bBwANH9lDCvW730BZdvhzlB" />
                </div>
                <p class="text-sm font-semibold text-slate-500 italic">Đoán cụm từ gồm 4 chữ</p>
            </div>
        </div>
        <div class="flex gap-3 mt-8 mb-10">
            <div
                class="w-14 h-14 bg-white border-2 border-slate-200 rounded-xl flex items-center justify-center text-2xl font-bold text-primary">
            </div>
            <div
                class="w-14 h-14 bg-white border-2 border-slate-200 rounded-xl flex items-center justify-center text-2xl font-bold text-primary">
            </div>
            <div
                class="w-14 h-14 bg-white border-2 border-slate-200 rounded-xl flex items-center justify-center text-2xl font-bold text-primary">
            </div>
            <div
                class="w-14 h-14 bg-white border-2 border-slate-200 rounded-xl flex items-center justify-center text-2xl font-bold text-primary">
            </div>
        </div>
        <div class="w-full max-w-sm space-y-3 mb-8">
            <div class="grid grid-cols-7 gap-2">
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">A</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">B</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">C</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">D</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">E</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">G</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">H</button>
            </div>
            <div class="grid grid-cols-7 gap-2">
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">I</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">K</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">L</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">M</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">N</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">O</button>
                <button
                    class="aspect-square bg-white shadow-sm rounded-xl text-lg font-bold text-slate-700 active:scale-95 transition-transform">P</button>
            </div>
        </div>
        <div class="w-full max-w-sm flex flex-col gap-4 mb-24">
            <div class="flex gap-3">
                <button
                    class="flex-1 py-3.5 bg-yellow-400 text-slate-900 font-bold rounded-[18px] text-sm shadow-sm active:opacity-90">
                    Gợi ý (-50)
                </button>
                <button
                    class="flex-1 py-3.5 bg-white border-2 border-primary text-primary font-bold rounded-[18px] text-sm active:bg-red-50">
                    Bỏ qua
                </button>
            </div>
            <button onclick="window.location.href='../chúc mừng nhận điểm/code.html'"
                class="w-full py-4 submit-gradient text-white font-extrabold rounded-2xl text-base tracking-wide active:scale-[0.98] transition-all">
                GỬI KẾT QUẢ
            </button>
        </div>
    </main>
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-black/95 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 flex justify-between items-center z-[100] pt-2 pb-[calc(1rem+safe-area-inset-bottom)] px-4 shadow-[0_-10px_30px_-5px_rgba(0,0,0,0.08)]">
        <a class="flex flex-col items-center gap-0.5 flex-1 min-w-0 text-slate-400 dark:text-slate-500"
            href="../home/code.html">
            <div class="w-9 h-9 rounded-full border-2 border-transparent flex items-center justify-center mb-0.5">
                <span class="material-symbols-outlined text-xl"
                    style="font-variation-settings: 'FILL' 0, 'wght' 400;">home</span>
            </div>
            <span class="text-[9px] font-semibold uppercase tracking-tighter whitespace-nowrap leading-none">Trang
                chủ</span>
        </a>
        <a class="flex flex-col items-center gap-0.5 flex-1 min-w-0 text-slate-400 dark:text-slate-500"
            href="../career hub/code.html">
            <div class="w-9 h-9 rounded-full border-2 border-transparent flex items-center justify-center mb-0.5">
                <span class="material-symbols-outlined text-xl"
                    style="font-variation-settings: 'FILL' 0, 'wght' 400;">explore</span>
            </div>
            <span class="text-[9px] font-semibold uppercase tracking-tighter whitespace-nowrap leading-none">Career
                Hub</span>
        </a>
        <a class="flex flex-col items-center gap-0.5 flex-1 min-w-0 text-slate-400 dark:text-slate-500"
            href="../tuyển sinh/code.html">
            <div class="w-9 h-9 rounded-full border-2 border-transparent flex items-center justify-center mb-0.5">
                <span class="material-symbols-outlined text-xl"
                    style="font-variation-settings: 'FILL' 0, 'wght' 400;">campaign</span>
            </div>
            <span class="text-[9px] font-semibold uppercase tracking-tighter whitespace-nowrap leading-none">Tuyển
                sinh</span>
        </a>
        <a class="flex flex-col items-center gap-0.5 flex-1 min-w-0 text-slate-400 dark:text-slate-500"
            href="../Cá nhân/code.html">
            <div class="w-9 h-9 rounded-full border-2 border-transparent flex items-center justify-center mb-0.5">
                <span class="material-symbols-outlined text-xl"
                    style="font-variation-settings: 'FILL' 0, 'wght' 400;">person</span>
            </div>
            <span class="text-[9px] font-semibold uppercase tracking-tighter whitespace-nowrap leading-none">Cá
                nhân</span>
        </a>
    </nav>
    <div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-300/40 rounded-full z-[60]"></div>

</body>

</html>
